<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두 수 더하기</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>두 수 더하기</h1>

    <form id="add-form">
      <div class="field">
        <label for="num1">첫 번째 수</label>
        <input type="number" id="num1" placeholder="숫자를 입력하세요" required>
      </div>

      <div class="field">
        <label for="num2">두 번째 수</label>
        <input type="number" id="num2" placeholder="숫자를 입력하세요" required>
      </div>

      <button type="submit">확인</button>
    </form>

    <div id="result" class="result"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
